<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vampir Köylü - Kusursuz Evler</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at top, #24334d, #0f172a 60%, #06070c 100%); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-container { box-shadow: 0 14px 60px rgba(0,0,0,0.92); border-radius: 14px; overflow: hidden; width: 100%; max-width: 1000px; height: 100vh; max-height: 650px; position: relative; border: 1px solid rgba(255,255,255,0.08); }
        .ui-panel { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 12px; z-index: 10; flex-wrap: wrap; }
        button { background-color: #2E8B57; color: white; border: 2px solid rgba(255,255,255,0.2); padding: 12px 24px; font-size: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        button:hover { transform: translateY(-2px); border-color: white; }
        button:active { transform: translateY(1px); }
        .info { position: absolute; top: 15px; text-align: center; width: 100%; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.9); z-index: 10; }
        .info p { letter-spacing: 0.4px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="game-container">
        <div class="info">
            <h2 style="margin:0;">Vampir Köylü: Kusursuz Mimari</h2>
            <p style="margin:5px 0 0 0; color:#ddd; font-weight: 500;">Atmosfer güçlendirildi: yıldızlar, ay ışığı, zemin detayları ve canlı kamp ateşi</p>
        </div>
        <div class="ui-panel">
            <button id="btnDay" style="background-color: #F59E0B;">☀️ Sabah Ol (Ateşe Toplan)</button>
            <button id="btnNight" style="background-color: #1E3A8A;">🌙 Gece Ol (Evlere Dön)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. TATLI KARAKTER SINIFI
        // ==========================================
        class Player {
            constructor(color, index, totalPlayers, houseRadius, fireRadius) {
                this.index = index;
                const angle = (index / totalPlayers) * Math.PI * 2;
                
                this.homePos = new THREE.Vector3(Math.cos(angle) * houseRadius, 1.0, Math.sin(angle) * houseRadius);
                this.firePos = new THREE.Vector3(Math.cos(angle) * fireRadius, 1.0, Math.sin(angle) * fireRadius);
                this.targetPos = this.firePos.clone();
                this.velocity = new THREE.Vector3();
                this.maxSpeed = 2.1;
                this.maxForce = 7.5;
                this.arriveRadius = 1.0;

                this.meshGroup = new THREE.Group();
                this.buildCharacter(color);
                
                this.meshGroup.position.copy(this.firePos);
                this.meshGroup.lookAt(0, 1, 0);
            }

            buildCharacter(colorHex) {
                const mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.8 });
                const blackMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

                this.body = new THREE.Group();
                const bodyMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.4, 4, 16), mat);
                bodyMesh.castShadow = true;
                this.body.add(bodyMesh);
                this.meshGroup.add(this.body);

                this.head = new THREE.Group();
                this.head.position.y = 0.55;
                const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 16), mat);
                headMesh.castShadow = true;
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), blackMat);
                leftEye.position.set(-0.18, 0.1, 0.4);
                const rightEye = leftEye.clone();
                rightEye.position.set(0.18, 0.1, 0.4);
                
                const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 8, 20, Math.PI), blackMat);
                mouth.position.set(0, -0.1, 0.42);
                mouth.rotation.z = Math.PI;

                this.head.add(headMesh, leftEye, rightEye, mouth);
                this.body.add(this.head);

                const createLimb = (radius, length) => {
                    const pivot = new THREE.Group();
                    const limbMesh = new THREE.Mesh(new THREE.CapsuleGeometry(radius, length, 4, 8), mat);
                    limbMesh.position.y = -(length / 2);
                    limbMesh.castShadow = true;
                    pivot.add(limbMesh);
                    return pivot;
                };

                this.leftArm = createLimb(0.12, 0.4);
                this.leftArm.position.set(-0.45, 0.2, 0);
                this.rightArm = createLimb(0.12, 0.4);
                this.rightArm.position.set(0.45, 0.2, 0);
                this.body.add(this.leftArm, this.rightArm);

                this.leftLeg = createLimb(0.14, 0.45);
                this.leftLeg.position.set(-0.2, -0.3, 0);
                this.rightLeg = createLimb(0.14, 0.45);
                this.rightLeg.position.set(0.2, -0.3, 0);
                this.meshGroup.add(this.leftLeg, this.rightLeg);
            }

            setTarget(position) {
                this.targetPos.copy(position);
            }

            update(delta, time) {
                const toTarget = this.targetPos.clone().sub(this.meshGroup.position);
                const distance = toTarget.length();

                if (distance > 0.06) {
                    const desiredSpeed = distance < this.arriveRadius
                        ? this.maxSpeed * (distance / this.arriveRadius)
                        : this.maxSpeed;
                    const desiredVelocity = toTarget.normalize().multiplyScalar(desiredSpeed);
                    const steering = desiredVelocity.sub(this.velocity).clampLength(0, this.maxForce * delta);

                    this.velocity.add(steering);
                    this.velocity.clampLength(0, this.maxSpeed);
                    this.meshGroup.position.addScaledVector(this.velocity, delta);

                    if (this.velocity.lengthSq() > 0.0001) {
                        const lookTarget = this.meshGroup.position.clone().add(this.velocity);
                        lookTarget.y = this.meshGroup.position.y;
                        this.meshGroup.lookAt(lookTarget);
                    }

                    const moveIntensity = THREE.MathUtils.clamp(this.velocity.length() / this.maxSpeed, 0.15, 1);
                    const walkFreq = time * 7;
                    const walkAmp = 0.35 * moveIntensity;

                    this.leftArm.rotation.x = Math.sin(walkFreq) * walkAmp;
                    this.rightArm.rotation.x = -Math.sin(walkFreq) * walkAmp;
                    this.leftLeg.rotation.x = -Math.sin(walkFreq) * walkAmp;
                    this.rightLeg.rotation.x = Math.sin(walkFreq) * walkAmp;

                    this.body.position.y = Math.abs(Math.sin(walkFreq)) * 0.09 * moveIntensity;
                    this.body.rotation.x = 0.06 * moveIntensity;
                } else {
                    this.velocity.multiplyScalar(Math.max(0, 1 - delta * 8));
                    this.meshGroup.lookAt(0, 1, 0);

                    const breath = Math.sin(time * 1.5 + this.index);
                    this.body.position.y = breath * 0.04;
                    this.body.rotation.x = 0;

                    this.leftArm.rotation.x = Math.sin(time * 0.35 + this.index) * 0.04;
                    this.rightArm.rotation.x = Math.sin(time * 0.35 + this.index) * 0.04;
                    this.leftLeg.rotation.x = 0;
                    this.rightLeg.rotation.x = 0;
                }
            }
        }

        // ==========================================
        // 2. KODLA ÇİZİLEN KUSURSUZ EV (HOUSE BUILDER)
        // ==========================================
        class HouseBuilder {
            static build(roofColorHex, windowsArray) {
                const houseGroup = new THREE.Group();

                const wallMat = new THREE.MeshStandardMaterial({ color: 0xffebd6, roughness: 0.9 }); 
                const woodMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.8 }); 
                const roofMat = new THREE.MeshStandardMaterial({ color: roofColorHex, roughness: 0.7, flatShading: true }); 
                
                // --- 1. GÖVDE ---
                const width = 3.6, depth = 3.6, radius = 0.6;
                const shape = new THREE.Shape();
                shape.moveTo(-width/2, -depth/2 + radius);
                shape.lineTo(-width/2, depth/2 - radius);
                shape.quadraticCurveTo(-width/2, depth/2, -width/2 + radius, depth/2);
                shape.lineTo(width/2 - radius, depth/2);
                shape.quadraticCurveTo(width/2, depth/2, width/2, depth/2 - radius);
                shape.lineTo(width/2, -depth/2 + radius);
                shape.quadraticCurveTo(width/2, -depth/2, width/2 - radius, -depth/2);
                shape.lineTo(-width/2 + radius, -depth/2);
                shape.quadraticCurveTo(-width/2, -depth/2, -width/2, -depth/2 + radius);

                const extrudeSettings = { depth: 2.2, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 };
                const wallGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                wallGeo.rotateX(-Math.PI / 2); 
                
                const walls = new THREE.Mesh(wallGeo, wallMat);
                walls.castShadow = true;
                walls.receiveShadow = true;
                houseGroup.add(walls);

                // --- 2. ÇATI VE BACA ---
                const roofHeight = 2.0;
                const roofGeo = new THREE.CylinderGeometry(0, 3.2, roofHeight, 4);
                roofGeo.rotateY(Math.PI / 4);
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.y = 2.3 + (roofHeight/2);
                roof.castShadow = true;
                
                const trimGeo = new THREE.CylinderGeometry(0, 3.1, 0.2, 4);
                trimGeo.rotateY(Math.PI / 4);
                const trim = new THREE.Mesh(trimGeo, woodMat);
                trim.position.y = - (roofHeight/2) + 0.1;
                roof.add(trim);
                houseGroup.add(roof);

                const chimney = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.6), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                chimney.position.set(-1.2, 2.3 + roofHeight/2, -1.0);
                chimney.castShadow = true;
                houseGroup.add(chimney);

                // --- 3. KEMERLİ KAPI (Z-FIGHTING ÇÖZÜLDÜ) ---
                const doorGroup = new THREE.Group();
                // DÜZELTME: Kapı kalınlığı 0.1'den 0.25'e çıkarıldı. Duvarla kesişmesi sağlandı.
                const doorBase = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.25), woodMat);
                doorBase.position.y = 0.6;
                const doorTop = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.25, 16), woodMat);
                doorTop.rotation.x = Math.PI / 2;
                doorTop.position.y = 1.2;
                doorGroup.add(doorBase, doorTop);
                
                const knob = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 }));
                // DÜZELTME: Tokmak kalınlaşan kapıya göre öne alındı
                knob.position.set(0.3, 0.6, 0.15); 
                doorGroup.add(knob);

                // DÜZELTME: Kapı evin duvarının içine doğru hafif gömüldü
                doorGroup.position.set(0, 0, depth/2 + 0.02); 
                houseGroup.add(doorGroup);

                const step = new THREE.Mesh(new THREE.CapsuleGeometry(0.2, 1.2, 4, 8), new THREE.MeshStandardMaterial({ color: 0x888888 }));
                step.rotation.z = Math.PI / 2;
                step.position.set(0, 0.1, depth/2 + 0.3);
                step.receiveShadow = true;
                houseGroup.add(step);

                // --- 4. MAVİ CAMLAR (Z-FIGHTING ÇÖZÜLDÜ) ---
                // DÜZELTME: Gündüz belirgin, yansıtıcı cam mavisi rengi verildi.
                const winMat = new THREE.MeshStandardMaterial({ 
                    color: 0x4488ff, // Cam Mavisi
                    roughness: 0.2, 
                    metalness: 0.8 
                }); 
                windowsArray.push(winMat);

                const createWindow = (px, py, pz) => {
                    const winGroup = new THREE.Group();
                    
                    // DÜZELTME: Camın kalınlığı (0.05 -> 0.2) artırıldı, duvarın içine geçiyor.
                    const glassGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 16);
                    glassGeo.rotateX(Math.PI / 2);
                    const glass = new THREE.Mesh(glassGeo, winMat);
                    winGroup.add(glass);

                    const frameGeo = new THREE.TorusGeometry(0.4, 0.08, 8, 24);
                    const frame = new THREE.Mesh(frameGeo, woodMat);
                    frame.position.z = 0.05; // Çerçeveyi hafif öne al
                    frame.castShadow = true;
                    winGroup.add(frame);

                    winGroup.position.set(px, py, pz);
                    return winGroup;
                };

                // DÜZELTME: Pencereler de duvarın içine 0.02 birim gömüldü.
                houseGroup.add(createWindow(-1.1, 1.3, depth/2 + 0.02)); 
                houseGroup.add(createWindow(1.1, 1.3, depth/2 + 0.02));  

                return houseGroup;
            }
        }

        // ==========================================
        // 3. OYUN YÖNETİCİSİ VE GÜNDÜZ/GECE DÖNGÜSÜ
        // ==========================================
        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);
                
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.set(0, 20, 32); 
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.0;
                document.getElementById('game-container').appendChild(this.renderer.domElement);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                this.clock = new THREE.Clock();
                this.isNight = false;
                this.moveCenter = new THREE.Vector3(0, 1.0, 0);

                this.players =[];
                this.windows =[];

                this.setupEnvironment();
                this.setupPlayersAndHouses();
                this.updatePlayerTargets("fire");

                document.getElementById('btnDay').onclick = () => this.setNight(false);
                document.getElementById('btnNight').onclick = () => this.setNight(true);

                this.raycaster = new THREE.Raycaster();
                this.pointer = new THREE.Vector2();
                this.groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                this.renderer.domElement.addEventListener('pointerdown', this.handlePointerDown.bind(this));

                this.animate = this.animate.bind(this);
                requestAnimationFrame(this.animate);
            }

            setupEnvironment() {
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(80, 80),
                    new THREE.MeshStandardMaterial({ color: 0x1a4a2a, roughness: 1 })
                );
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                const innerGround = new THREE.Mesh(
                    new THREE.CircleGeometry(8, 48),
                    new THREE.MeshStandardMaterial({ color: 0x2f5a2f, roughness: 0.95 })
                );
                innerGround.rotation.x = -Math.PI / 2;
                innerGround.position.y = 0.01;
                innerGround.receiveShadow = true;
                this.scene.add(innerGround);

                const pathRing = new THREE.Mesh(
                    new THREE.RingGeometry(8.5, 12.2, 72),
                    new THREE.MeshStandardMaterial({ color: 0x8b6b47, roughness: 0.98 })
                );
                pathRing.rotation.x = -Math.PI / 2;
                pathRing.position.y = 0.02;
                pathRing.receiveShadow = true;
                this.scene.add(pathRing);

                this.starsMat = new THREE.PointsMaterial({
                    color: 0xdde8ff,
                    size: 0.16,
                    transparent: true,
                    opacity: 0,
                    depthWrite: false
                });
                const starsGeo = new THREE.BufferGeometry();
                const stars = [];
                for (let i = 0; i < 500; i++) {
                    const radius = 24 + Math.random() * 24;
                    const theta = Math.random() * Math.PI * 2;
                    const y = 8 + Math.random() * 22;
                    stars.push(Math.cos(theta) * radius, y, Math.sin(theta) * radius);
                }
                starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars, 3));
                this.stars = new THREE.Points(starsGeo, this.starsMat);
                this.scene.add(this.stars);

                this.moon = new THREE.Mesh(
                    new THREE.SphereGeometry(1.3, 24, 24),
                    new THREE.MeshStandardMaterial({ color: 0xe5efff, emissive: 0x5a6a88, emissiveIntensity: 0.45, roughness: 0.4 })
                );
                this.moon.position.set(-24, 20, -18);
                this.scene.add(this.moon);

                this.fireGroup = new THREE.Group();
                const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2314 });
                for(let i=0; i<6; i++) {
                    const wood = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 1.8, 8), woodMat);
                    wood.rotation.z = Math.PI / 3;
                    wood.rotation.y = (Math.PI / 3) * i;
                    wood.position.y = 0.25;
                    wood.castShadow = true;
                    this.fireGroup.add(wood);
                }

                this.flameCore = new THREE.Mesh(
                    new THREE.ConeGeometry(0.38, 1.2, 14),
                    new THREE.MeshStandardMaterial({ color: 0xffa11c, emissive: 0xff6a00, emissiveIntensity: 1.1, transparent: true, opacity: 0.95 })
                );
                this.flameCore.position.y = 0.9;
                this.flameCore.castShadow = true;

                this.flameOuter = new THREE.Mesh(
                    new THREE.ConeGeometry(0.62, 1.6, 14),
                    new THREE.MeshStandardMaterial({ color: 0xffd36a, emissive: 0xff8a24, emissiveIntensity: 0.9, transparent: true, opacity: 0.65 })
                );
                this.flameOuter.position.y = 0.85;
                this.flameOuter.castShadow = true;
                this.flameOuter.rotation.y = Math.PI / 10;
                this.fireGroup.add(this.flameOuter, this.flameCore);
                
                this.ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(this.ambientLight);

                this.hemiLight = new THREE.HemisphereLight(0x9fd0ff, 0x1b2718, 0.45);
                this.scene.add(this.hemiLight);

                this.dirLight = new THREE.DirectionalLight(0xfff5b6, 1.5); 
                this.dirLight.position.set(15, 25, 15);
                this.dirLight.castShadow = true;
                this.dirLight.shadow.mapSize.width = 1024;
                this.dirLight.shadow.mapSize.height = 1024;
                this.scene.add(this.dirLight);

                this.fireLight = new THREE.PointLight(0xff7700, 0, 20); 
                this.fireLight.position.set(0, 1, 0);
                this.fireLight.castShadow = true;
                this.scene.add(this.fireLight);
                this.scene.add(this.fireGroup);

                const stoneMat = new THREE.MeshStandardMaterial({ color: 0x7c7c7c, roughness: 0.9 });
                for (let i = 0; i < 16; i++) {
                    const a = (i / 16) * Math.PI * 2;
                    const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(0.28 + Math.random() * 0.12), stoneMat);
                    stone.position.set(Math.cos(a) * 1.45, 0.12, Math.sin(a) * 1.45);
                    stone.scale.y = 0.65;
                    stone.castShadow = true;
                    stone.receiveShadow = true;
                    this.scene.add(stone);
                }

                const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2f1b, roughness: 0.9 });
                const treeLeafMat = new THREE.MeshStandardMaterial({ color: 0x1f5d2f, roughness: 0.85 });
                for (let i = 0; i < 18; i++) {
                    const angle = (i / 18) * Math.PI * 2;
                    const radius = 20 + (i % 3) * 4;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 2.2, 8), treeTrunkMat);
                    trunk.position.set(x, 1.1, z);
                    trunk.castShadow = true;
                    const crown = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2.4, 10), treeLeafMat);
                    crown.position.set(x, 2.8, z);
                    crown.castShadow = true;
                    this.scene.add(trunk, crown);
                }
            }

            setupPlayersAndHouses() {
                const colors =[0xEF4444, 0x3B82F6, 0x10B981, 0xF59E0B, 0x8B5CF6, 0xEC4899];
                const houseRadius = 13;
                const fireRadius = 4.5;

                colors.forEach((color, index) => {
                    const player = new Player(color, index, colors.length, houseRadius, fireRadius);
                    this.players.push(player);
                    this.scene.add(player.meshGroup);
                    
                    const house = HouseBuilder.build(color, this.windows);
                    house.position.copy(player.homePos);
                    house.lookAt(0, 0, 0);
                    this.scene.add(house);
                });
            }

            setNight(state) {
                this.isNight = state;
                this.moveCenter.set(0, 1.0, 0);
                this.updatePlayerTargets(state ? "home" : "fire");
            }

            handlePointerDown(event) {
                if (this.isNight) return;

                const rect = this.renderer.domElement.getBoundingClientRect();
                this.pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                this.pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                this.raycaster.setFromCamera(this.pointer, this.camera);

                const hit = new THREE.Vector3();
                if (this.raycaster.ray.intersectPlane(this.groundPlane, hit)) {
                    this.moveCenter.set(
                        THREE.MathUtils.clamp(hit.x, -9, 9),
                        1.0,
                        THREE.MathUtils.clamp(hit.z, -9, 9)
                    );
                    this.updatePlayerTargets("custom");
                }
            }

            updatePlayerTargets(mode = "fire") {
                this.players.forEach((player, index, arr) => {
                    if (mode === "home") {
                        player.setTarget(player.homePos);
                        return;
                    }

                    const angle = (index / arr.length) * Math.PI * 2;
                    const radius = mode === "custom" ? 2.6 : 4.5;
                    const formationTarget = new THREE.Vector3(
                        this.moveCenter.x + Math.cos(angle) * radius,
                        1.0,
                        this.moveCenter.z + Math.sin(angle) * radius
                    );
                    player.setTarget(formationTarget);
                });
            }

            animate() {
                requestAnimationFrame(this.animate);
                const delta = this.clock.getDelta();
                const time = this.clock.getElapsedTime();

                const targetBg = this.isNight ? new THREE.Color(0x0a0a1a) : new THREE.Color(0x87CEEB);
                this.scene.background = this.scene.background || new THREE.Color(0x87CEEB);
                this.scene.background.lerp(targetBg, delta * 2);
                this.scene.fog.color.lerp(targetBg, delta * 2);
                
                this.ambientLight.intensity = THREE.MathUtils.lerp(this.ambientLight.intensity, this.isNight ? 0.2 : 0.6, delta * 2);
                this.hemiLight.intensity = THREE.MathUtils.lerp(this.hemiLight.intensity, this.isNight ? 0.18 : 0.45, delta * 2);
                this.dirLight.intensity = THREE.MathUtils.lerp(this.dirLight.intensity, this.isNight ? 0.05 : 1.5, delta * 2);
                
                const fireIntensity = this.isNight ? (2.1 + Math.sin(time * 7) * 0.35) : (1.15 + Math.sin(time * 6) * 0.18);
                this.fireLight.intensity = THREE.MathUtils.lerp(this.fireLight.intensity, fireIntensity, delta * 4);
                this.fireGroup.scale.y = 1 + Math.sin(time * 9) * 0.06;
                this.fireGroup.position.y = Math.max(0, Math.sin(time * 9) * 0.03);
                this.flameCore.scale.setScalar(1 + Math.sin(time * 14) * 0.08);
                this.flameOuter.scale.set(1 + Math.sin(time * 10) * 0.1, 1 + Math.sin(time * 13) * 0.12, 1 + Math.sin(time * 11) * 0.1);
                this.flameCore.material.opacity = this.isNight ? 0.98 : 0.86;
                this.flameOuter.material.opacity = this.isNight ? 0.72 : 0.52;
                this.starsMat.opacity = THREE.MathUtils.lerp(this.starsMat.opacity, this.isNight ? 0.95 : 0, delta * 1.8);
                this.moon.material.emissiveIntensity = THREE.MathUtils.lerp(this.moon.material.emissiveIntensity, this.isNight ? 0.95 : 0.22, delta * 1.5);
                this.renderer.toneMappingExposure = THREE.MathUtils.lerp(this.renderer.toneMappingExposure, this.isNight ? 0.72 : 1.02, delta * 1.2);

                // DÜZELTME: Cam renkleri gündüz masmavi, gece sarı-ışıklı olacak şekilde güncellendi.
                const winColorDay = new THREE.Color(0x4488ff); 
                const winColorNight = new THREE.Color(0xffcc00);
                const winEmissiveDay = new THREE.Color(0x000000);
                const winEmissiveNight = new THREE.Color(0xffaa00);
                
                this.windows.forEach(win => {
                    win.color.lerp(this.isNight ? winColorNight : winColorDay, delta * 2);
                    win.emissive.lerp(this.isNight ? winEmissiveNight : winEmissiveDay, delta * 2);
                });

                this.players.forEach(p => p.update(delta, time));
                
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new Game();
    </script>
</body>
</html>
